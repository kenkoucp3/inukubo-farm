        const useScrollFadeIn = (direction = 'up', duration = 1, delay = 0) => {
            const domRef = useRef();
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                if (domRef.current) observer.observe(domRef.current);
                return () => { if (domRef.current) observer.unobserve(domRef.current); };
            }, []);
            let translateStyle = {};
            if (direction === 'up') translateStyle = { transform: isVisible ? 'translateY(0)' : 'translateY(30px)' };
            if (direction === 'left') translateStyle = { transform: isVisible ? 'translateX(0)' : 'translateX(30px)' };
            if (direction === 'right') translateStyle = { transform: isVisible ? 'translateX(0)' : 'translateX(-30px)' };
            return { ref: domRef, style: { opacity: isVisible ? 1 : 0, transition: `opacity ${duration}s ease-out ${delay}s, transform ${duration}s ease-out ${delay}s`, ...translateStyle } };

                                            <p className="text-xs text-gray-500 mt-2 font-bold">注文後72時間以内に入金がない場合は自動キャンセルとなります。</p>
                                            {isPreorder && <p className="text-xs text-[#b49b57] mt-2 font-bold font-tsukushi">新米の発送は11月頃を予定しております。</p>}
                                        </>
                                    )}
                                </div>
                                <div className="space-y-3 mb-8">
                                    <div className="flex justify-between text-sm"><span>商品代金</span><span className="font-bold font-price">¥{option.price.toLocaleString()}</span></div>
                                    <div className="flex justify-between text-sm"><span>送料</span><span className="font-bold font-price">{formData.pref && isSub ? '無料' : formData.pref && formData.pref !== "選択してください" ? `¥${shippingFee.toLocaleString()}` : "---"}</span></div>
                                    <div className="flex justify-between items-end border-t pt-4 font-bold"><span className="text-sm">合計金額（税込）</span><span className="text-3xl font-bold text-[#b49b57] font-price">¥{(option.price + shippingFee).toLocaleString()}</span></div>
                                </div>
                                <button type="submit" disabled={isSubmitting || isSub || !canSubmit} className={`w-full py-5 text-sm transition-all font-bold uppercase tracking-widest ${isSubmitting || isSub || !canSubmit ? 'bg-gray-300 text-white cursor-not-allowed' : 'bg-[#2c2c2c] text-white hover:bg-[#b49b57]'}`}>{isSubmitting ? '送信中...' : isSub ? '準備中' : '注文を確定する'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const HelpGemini = ({ currentPage }) => {
            const [sel, setSel] = useState(null);
            const [inq, setInq] = useState("");
            const [ans, setAns] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSending, setIsSending] = useState(false);
            const [resolvedStatus, setResolvedStatus] = useState(null);
            const sortedFAQ = [...FAQ_LIST].sort((a, b) => (a.cat === currentPage ? -1 : 1));

            const handleAskGemini = async () => {
                if (!inq.trim()) return; 
                setLoading(true); setAns(null); setResolvedStatus(null);
                setTimeout(() => {
                    const q = inq.toLowerCase(); 
                    let r = "申し訳ありません。適した回答が見つかりませんでした。以下のボタンから直接農園へお問い合わせください。";
                    if (q.includes("送料") || q.includes("いくら")) r = "送料は地域と重量により異なります。購入画面で住所を選択すると自動計算されます。";
                    else if (q.includes("振込") || q.includes("支払")) r = "現在は銀行振込のみ承っております。注文後の自動返信メールで詳細な口座をご案内します。";
                    else if (q.includes("出水") || q.includes("どこ")) r = "鹿児島県出水市に農園があります。万羽鶴の越冬地として知られる自然豊かな土地です。";
                    else if (q.includes("保存")) r = "お米は冷蔵庫の野菜室など、湿気の少ない冷暗所での保存を推奨しております。";
                    else if (q.includes("白米") || q.includes("玄米")) r = "犬窪農園では極上の白米と、徹底管理された栄養豊富な玄米をご用意しております。";
                    setAns(r); setLoading(false);
                }, 1500);
            };

            const handleFeedback = (status) => {
                setIsSending(true);
                const data = { type: 'inquiry', date: new Date().toLocaleString('ja-JP'), category: currentPage || 'home', content: inq, status: status };
                fetch(GAS_WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
                .then(() => {
                    setIsSending(false); setResolvedStatus(status);
                    if (status === '解決済み') setAns("お役に立てて光栄です！他にご質問がございましたらお気軽にどうぞ。");
                    else setAns("農園へお問い合わせを自動送信しました。担当者からの返信をお待ちください。");
                }).catch(() => { setIsSending(false); alert("送信エラーが発生しました。"); });
            };

            return (
                <section id="help" className="py-24 bg-[#b49b57]/5 text-[#2c2c2c] border-t border-[#b49b57]/10">
                    <div className="max-w-7xl mx-auto px-8 flex flex-col lg:flex-row gap-16 items-start">
                        <div className="w-full lg:w-3/5 text-left">
                            <span className="text-[#b49b57] text-[10px] tracking-[0.4em] uppercase block mb-6 font-bold uppercase">Help Gemini / よくあるご質問</span>
                            <h2 className="text-2xl md:text-3xl mb-12 tracking-widest font-bold font-tsukushi">お困りのことはございませんか？</h2>
                            <div className="space-y-4">
                                {sortedFAQ.map((f, i) => (
                                    <div key={i} className="border-b border-[#b49b57]/10 pb-4">
                                        <button onClick={() => setSel(sel === i ? null : i)} className="w-full flex justify-between py-2 hover:text-[#b49b57] transition-colors"><span className="flex items-center gap-3 text-sm md:text-base font-bold font-tsukushi"><HelpCircle size={18} className="text-[#b49b57]"/> {f.q}</span><ChevronDown size={16} className={sel === i ? 'rotate-180' : ''}/></button>
                                        {sel === i && <p className="mt-4 text-xs text-gray-600 pl-8 border-l-2 border-[#b49b57] bg-white p-4 leading-relaxed font-tsukushi font-bold">{f.a}</p>}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="w-full lg:w-2/5 bg-[#b49b57]/10 p-8 border border-[#b49b57]/20 rounded-sm">
                            <span className="text-[#b49b57] text-[10px] mb-6 block font-bold uppercase tracking-widest font-tsukushi">HelpGemini / その他質問</span>
                            <div className="space-y-4">
                                <div className="relative">
                                    <textarea value={inq} onChange={e=>setInq(e.target.value)} disabled={loading || isSending} className="w-full bg-white/80 border border-[#b49b57]/20 p-4 pr-12 h-32 text-sm outline-none focus:border-[#b49b57] rounded-sm text-[#2c2c2c]" placeholder="お調べしたい内容を入力してください..."></textarea>
                                    <button onClick={handleAskGemini} disabled={loading || isSending} className="absolute bottom-4 right-4 text-[#b49b57] hover:scale-110 transition-transform"><Search size={20}/></button>
                                </div>
                                {loading && <div className="p-4 text-xs text-[#b49b57] animate-pulse font-bold">Geminiがサイト内の情報を探しています...</div>}
                                {ans && (
                                    <div className="p-5 bg-white border border-[#b49b57]/20 rounded-sm text-sm leading-relaxed animate-fadeIn shadow-sm">
                                        <div className="flex items-center gap-2 mb-2 text-[#b49b57] font-bold font-tsukushi"><MessageCircle size={14}/> Geminiの回答</div>
                                        <p className="text-gray-700 mb-4 font-bold">{ans}</p>
                                        {!resolvedStatus && (
                                            <div className="flex flex-col gap-2 mt-4 pt-4 border-t border-[#b49b57]/10 font-bold">
                                                <p className="text-xs font-bold text-gray-500 mb-1">この回答で解決しましたか？</p>
                                                <button onClick={() => handleFeedback('解決済み')} disabled={isSending} className="w-full bg-[#b49b57]/10 text-[#b49b57] border border-[#b49b57]/30 py-2 text-xs font-bold rounded hover:bg-[#b49b57]/20 transition-colors">はい、解決しました</button>
                                                <button onClick={() => handleFeedback('未対応')} disabled={isSending} className="w-full bg-[#2c2c2c] text-white py-2 text-xs font-bold rounded hover:bg-black transition-colors flex items-center justify-center gap-2"><Send size={12}/> いいえ、農園に直接問い合わせる</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                                <div className="pt-4 border-t border-[#b49b57]/20 flex items-center gap-4 text-[11px] text-[#b49b57] font-bold uppercase font-sans"><Mail size={14}/> inukubofarm@gmail.com</div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const HomePageContent = ({ openOrderModal, navigate }) => (
            <>
                <HeroSection />
                <AboutSection />
                <section id="products" className="py-24 md:py-40 bg-[#fcfbf9]"><ProductsSection openOrderModal={openOrderModal} navigate={navigate} /></section>
                <section id="process" className="py-24 md:py-40 bg-white overflow-hidden">
                    <div className="max-w-7xl mx-auto px-8">
                        <div className="text-center mb-24 md:mb-32">
                            <span className="text-[#b49b57] text-[10px] tracking-[0.4em] block mb-6 uppercase font-bold font-tsukushi">Process / 犬窪米ができるまで</span>
                            <h2 className="text-2xl md:text-4xl text-[#2c2c2c] tracking-[0.15em] mb-4 font-bold font-tsukushi">極上の一粒を育む, 四季の営み</h2>
                            <div className="w-16 h-px bg-[#b49b57] mx-auto opacity-40"></div>
                        </div>
                        <div className="mt-20">
                            {PROCESS_STEPS.map((step, index) => (<ProcessStep key={step.id} step={step} index={index} />))}
                        </div>
                    </div>
                </section>
                <section id="voices" className="py-24 md:py-40 bg-[#fcfbf9] text-[#2c2c2c]">
                    <div className="max-w-7xl mx-auto px-8">
                        <div className="text-center mb-24 md:mb-32">
                            <span className="text-[#b49b57] text-[10px] tracking-[0.4em] block mb-6 uppercase text-center font-bold font-tsukushi">Aspiration / 想いと喜び</span>
                            <h2 className="text-2xl md:text-4xl text-[#2c2c2c] tracking-[0.15em] mb-4 font-bold font-tsukushi">生産者とお客様の声</h2>
                            <div className="w-16 h-px bg-[#b49b57] mx-auto opacity-40"></div>
                        </div>
                        <VoicesSectionContent />
                    </div>
                </section>
            </>
        );

        // --- 5. メインアプリケーション ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [scrolled, setScrolled] = useState(false);
            const [orderModalData, setOrderModalData] = useState(null);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

            const navigate = (page) => { setCurrentPage(page); };
            const openOrderModal = (product, option) => { setOrderModalData({ product, option }); };

            const renderContent = () => {
                switch (currentPage) {
                    case 'home': return <HomePageContent openOrderModal={openOrderModal} navigate={navigate} />;
                    case 'subscription-guide': return <SubscriptionGuidePage navigate={navigate} />;
                    case 'about': return (
                        <div className="bg-white min-h-screen text-left">
                            <PageHeader enTitle="Story / 私たちの原点" jaTitle="万羽鶴が選ぶ奇跡の地で、極上の一粒を育む。" />
                            <div className="max-w-7xl mx-auto px-8 pb-32">
                                <div className="grid md:grid-cols-12 gap-8 md:gap-12 items-start text-left">
                                    <div className="md:col-span-4 flex flex-col gap-4">
                                        <div className="relative h-[180px] md:h-[220px] overflow-hidden shadow-2xl"><img src={IMAGE_RESOURCES.story1} className="w-full h-full object-cover" alt="story1"/><div className="absolute inset-0 border border-[#b49b57]/30 m-4"></div></div>
                                        <div className="relative h-[180px] md:h-[220px] overflow-hidden shadow-2xl"><img src={IMAGE_RESOURCES.story2} className="w-full h-full object-cover" alt="story2"/><div className="absolute inset-0 border border-[#b49b57]/30 m-4"></div></div>
                                        <div className="relative h-[180px] md:h-[220px] overflow-hidden shadow-2xl"><img src={IMAGE_RESOURCES.story3} className="w-full h-full object-cover" alt="story3"/><div className="absolute inset-0 border border-[#b49b57]/30 m-4"></div></div>
                                    </div>
                                    <div className="md:col-span-8 space-y-6 text-left leading-relaxed">
                                        <p>お米作りは、ただ作物を作ることではなく、命を育むこと。<br/>私たちが米作りに情熱を注ぐ理由は、本当に美味しいお米が食卓にあるだけで、家族の顔に自然と笑顔が溢れる、あの温かい瞬間を守りたいからです。</p>
                                        <p>巡り合ったこの「出水（いずみ）」という土地こそが、理想のお米を育むための最後のピースでした。</p>
                                        <p>毎年冬になると、シベリアから一万羽を超えるツルが越冬のためにこの地へ舞い降ります。野生のツルは非常に繊細です。彼らが何千キロもの旅の目的地として出水を選ぶのは、ここが極めて清浄で、命を繋ぐための豊かな自然環境が保たれている何よりの証です。</p>
                                        <p>出水の山々から湧き出る、ミネラルたっぷりの澄み切った伏流水。そして、お米の甘みと旨味を極限まで引き出す、昼夜の激しい寒暖差。</p>
                                        <p>この奇跡のような「風土（テロワール）」と、土作りから収穫まで一切の妥協を許さない私たちの「手」が合わさることで、他にはない力強い生命力と、宝石のようなツヤを持つ犬窪米が誕生します。</p>
                                        <p>私たちは、農薬や化学肥料に頼りすぎず、自然の摂理に寄り添った農法を貫いています。一口食べれば、その違いがきっと伝わるはずです。</p>
                                        <p>出水の自然がくれた恵みへの感謝を胸に、私たちは今日も土と向き合い続けます。</p>
                                        <p>犬窪農園の情熱が詰まった極上の一粒を、ぜひあなたの大切な人と一緒に味わってみてください。</p>
                                    </div>
                                </div>
                                <div className="mt-12 text-center bg-[#fcfbf9] py-10 px-6 border border-[#b49b57]/20 shadow-sm fade-in visible">
                                    <p className="text-[#b49b57] font-bold text-[15px] md:text-[18px] leading-loose font-tsukushi">「やっぱり、出水の犬窪さんのお米じゃないと。」<br/>全国のお客様にそう言っていただける究極の食味を、自信を持ってお届けします。</p>
                                </div>
                            </div>
                        </div>
                    );
                    case 'products': return (
                        <div className="bg-[#fcfbf9] min-h-screen">
                            <PageHeader enTitle="Collection / 商品一覧" jaTitle="犬窪農園の極上米" />
                            <div className="pb-32"><ProductsSection openOrderModal={openOrderModal} navigate={navigate} /></div>
                        </div>
                    );
                    case 'process': return (
                        <div className="bg-white min-h-screen">
                            <PageHeader enTitle="Process / 犬窪米ができるまで" jaTitle="極上の一粒を育む, 四季の営み" />
                            <div className="max-w-7xl mx-auto px-8 pb-32">
                                {PROCESS_STEPS.map((step, index) => (<ProcessStep key={step.id} step={step} index={index} />))}
                            </div>
                        </div>
                    );
                    case 'voices': return (
                        <div className="bg-[#fcfbf9] min-h-screen">
                            <PageHeader enTitle="Aspiration / 想いと喜び" jaTitle="生産者とお客様の声" />
                            <div className="max-w-7xl mx-auto px-8 pb-32"><VoicesSectionContent /></div>
                        </div>
                    );
                    case 'campaign': return <CampaignPage openOrderModal={openOrderModal} />;
                    default: return <HomePageContent openOrderModal={openOrderModal} navigate={navigate} />;
                }
            };

            return (
                <div className="min-h-screen bg-[#fcfbf9] selection:bg-[#b49b57] selection:text-white flex flex-col">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled || currentPage !== 'home' ? 'bg-white shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                            <button onClick={() => navigate('home')} className={`font-tsukushi tracking-[0.3em] font-bold text-lg md:text-xl transition-colors ${scrolled || currentPage !== 'home' ? 'text-[#2c2c2c]' : 'text-white'}`}>犬窪農園 <span className="text-[9px] ml-3 opacity-70 font-sans tracking-[0.4em] uppercase hidden xl:inline-block">Inukubo Farm</span></button>
                            <div className="flex gap-4 md:gap-8 items-center font-bold">
                                {[{ id: 'home', label: 'ホーム' }, { id: 'about', label: '私たちの原点' }, { id: 'products', label: '商品一覧' }, { id: 'process', label: '犬窪米が出来るまで' }, { id: 'voices', label: '想いと喜び' }].map((item) => (
                                    <button key={item.id} onClick={() => navigate(item.id)} className={`text-[10px] md:text-[11px] font-tsukushi tracking-[0.2em] transition-colors hidden md:block ${currentPage === item.id && item.id !== 'home' ? 'text-[#b49b57]' : (scrolled || currentPage !== 'home' ? 'text-[#2c2c2c] hover:text-[#b49b57]' : 'text-white hover:text-[#b49b57]')}`}>{item.label}</button>
                                ))}
                                <button onClick={() => navigate('campaign')} className={`text-[10px] md:text-[11px] font-tsukushi tracking-[0.2em] transition-all px-4 py-2 border ${currentPage === 'campaign' ? 'bg-[#b49b57] text-white border-[#b49b57]' : (scrolled || currentPage !== 'home' ? 'border-[#b49b57] text-[#b49b57] hover:bg-[#b49b57] hover:text-white' : 'border-white text-white hover:bg-white hover:text-[#2c2c2c]')}`}>新米予約</button>
                            </div>
                        </div>
                    </nav>
                    <main className="flex-grow">{renderContent()}</main>
                    <HelpGemini currentPage={currentPage} />
                    <footer className="bg-[#fcfbf9] py-24 text-center border-t border-gray-100">
                        <div className="max-w-7xl mx-auto px-8">
                            <button onClick={() => navigate('home')} className="mb-10 tracking-[0.4em] font-bold text-[#2c2c2c] text-2xl font-tsukushi">犬窪農園</button>
                            <p className="text-[10px] tracking-[0.2em] mb-12 font-bold uppercase text-gray-400">Izumi City, Kagoshima Prefecture, Japan</p>
                            <div className="w-12 h-px bg-[#b49b57]/40 mx-auto mb-12"></div>
                            <p className="text-[9px] tracking-[0.1em] font-bold text-gray-400">© 2026 INUKUBO FARM. ALL RIGHTS RESERVED.</p>
                        </div>
                    </footer>
                    {orderModalData && <OrderModal product={orderModalData.product} option={orderModalData.option} onClose={() => setOrderModalData(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
